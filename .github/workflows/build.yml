name: Build ESP32-S3 Firmware

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2

      # 1. 安装 ESP32 Rust 工具链（包含 Xtensa 编译器）
      - uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: true

      # 2. 安装 cargo-binstall（专门管理预编译工具的命令）
      - name: Install cargo-binstall
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh \
            | bash

      # 3. 用 binstall 安装 cargo-espflash（自动下载二进制，不编译）
      - name: Install espflash
        run: cargo binstall cargo-espflash --version 3.0.0 --no-confirm

      # 4. 编译固件（这部分你的原代码）
      - name: Build firmware
        working-directory: firmware/handheld
        run: cargo build --release --features rev2

      # 5. 生成 flashable 二进制文件
      - name: Generate binary
        working-directory: firmware/handheld
        run: cargo espflash save-image --release --chip esp32s3 --features rev2 firmware.bin

      # 6. 上传产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handheld-firmware
          path: |
            firmware/handheld/target/release/*.elf
            firmware/handheld/firmware.bin
          if-no-files-found: error
