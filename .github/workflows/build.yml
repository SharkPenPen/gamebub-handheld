name: Build ESP32-S3 Firmware

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 缓存 Rust 编译依赖，加速后续构建
      - uses: Swatinem/rust-cache@v2

      # 安装 ESP32-S3 工具链（编译器、链接器等）
      - uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: true

      # 安装 espflash（官方发布的可执行文件，无需编译）
      - uses: esp-rs/actions/install-espflash@v1
        with:
          version: '3.0.0'   # 指定稳定版

      # 先编译一次，让可能的编译错误提前暴露（可选）
      - name: Build firmware
        working-directory: firmware/handheld
        run: cargo build --release --features rev2

      # 生成合并后的完整镜像（bootloader + 分区表 + app）
      - name: Generate merged firmware
        working-directory: firmware/handheld
        run: espflash save-image --release --chip esp32s3 --features rev2 --merge firmware_merged.bin

      # 上传构建产物（合并镜像 + ELF 调试文件）
      - uses: actions/upload-artifact@v4
        with:
          name: handheld-firmware
          path: |
            firmware/handheld/firmware_merged.bin
            firmware/handheld/target/release/*.elf
          if-no-files-found: error
