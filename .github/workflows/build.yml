name: Build ESP32-S3 Firmware

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      # 👇 关键：传入 GITHUB_TOKEN 避免 API 速率限制
      - uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-espflash@3.0.0

      - name: Build firmware
        working-directory: firmware/handheld
        run: cargo build --release --features rev2

      - name: Generate merged firmware
        working-directory: firmware/handheld
        run: cargo espflash save-image --release --chip esp32s3 --features rev2 --merge firmware_merged.bin

      - uses: actions/upload-artifact@v4
        with:
          name: handheld-firmware
          path: |
            firmware/handheld/firmware_merged.bin
            firmware/handheld/target/release/*.elf
          if-no-files-found: error
