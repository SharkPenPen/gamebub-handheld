name: Build ESP32-S3 Firmware

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2

      - name: Setup ESP32 toolchain
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: true

      - name: Install espflash
        run: cargo install cargo-espflash --version 3.0.0   # ← 只改了这一行

      - name: Build firmware
        working-directory: firmware/handheld
        run: cargo build --release --features rev2

      - name: Generate binary
        working-directory: firmware/handheld
        run: cargo espflash save-image --release --chip esp32s3 --features rev2 firmware.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handheld-firmware
          path: |
            firmware/handheld/target/release/*.elf
            firmware/handheld/firmware.bin
          if-no-files-found: error
