name: Build ESP32-S3 Firmware

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        # 所有命令在此目录执行（根据你的项目结构修改）
        working-directory: ./firmware/handheld
    env:
      # espup 导出脚本路径
      EXPORT_SCRIPT: ~/export-esp.sh

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            python3 python3-pip python3-venv \
            libusb-1.0-0 libusb-1.0-0-dev \
            libudev-dev \
            libssl-dev \
            pkg-config \
            curl \
            git

      # 使用 Rust 官方的稳定工具链作为基础（epup 会额外安装 Xtensa 工具链）
      - name: Setup stable Rust
        uses: dtolnay/rust-toolchain@stable

      # 缓存 Rust 工具链、Cargo 索引、espup 资源
      - name: Cache Rust & ESP toolchains
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup
            ~/.cargo/registry
            ~/.cargo/git
            ~/.espressif
            ~/export-esp.sh
          key: esp-toolchain-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            esp-toolchain-${{ runner.os }}-

      - name: Install espup & ESP-IDF toolchain
        run: |
          cargo install espup
          espup install --targets esp32s3 -s ${{ env.EXPORT_SCRIPT }}

      # 将所有后续步骤需要的环境变量写入 $GITHUB_ENV，避免反复 source
      - name: Persist ESP environment
        run: |
          source ${{ env.EXPORT_SCRIPT }}
          echo "IDF_PATH=$IDF_PATH" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=$LIBCLANG_PATH" >> $GITHUB_ENV
          # 添加 Xtensa Rust 工具链到 PATH
          echo "$HOME/.rustup/toolchains/esp/bin" >> $GITHUB_PATH

      # 编译项目（不手动指定 target，由 .cargo/config.toml 决定）
      - name: Build firmware
        run: cargo build --release

      # 生成可烧录的 bin 文件（合并 bootloader、分区表、应用）
      - name: Generate flashable binary
        run: |
          cargo espflash save-image --release --chip esp32s3 ./firmware.bin

      # 上传固件（ELF 和 BIN 都保留）
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handheld-firmware
          path: |
            firmware/handheld/target/release/*.elf
            firmware/handheld/firmware.bin
          if-no-files-found: error
