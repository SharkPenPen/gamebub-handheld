name: Build ESP32 Firmware

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ESP32 Firmware
        uses: esp-rs/rust-build@v1
        with:
          directory: ./firmware/handheld
          target: esp32s3
          build-args: --release
