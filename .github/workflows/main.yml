name: Build ESP32 Firmware

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 下载你的代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 用 GitHub 官方插件安装 Rust (不会再报过时的警告了)
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: esp32s3

      # 3. 安装 ESP 的专属工具
      - name: Install ESP tools
        run: |
          cargo install espup

      # 4. 下载并配置 ESP-IDF 编译环境（这一步会占用几秒钟）
      - name: Install ESP-IDF dependencies
        run: |
          espup install -s ~/export-esp.sh

      # 5. 激活环境并开始编译
      - name: Build firmware
        working-directory: ./firmware/handheld
        run: |
          source ~/export-esp.sh
          cargo build --release

      # 6. 上传生成好的 .bin 文件
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: firmware/handheld/target/esp32s3/release/handheld.bin
