name: Build ESP32-S3 Firmware
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ESP_EXPORT: ~/export-esp.sh
      # 全局显式声明目标，全步骤统一，彻底规避配置漏读
      ESP_TARGET: xtensa-esp32s3-none-elf
    steps:
      # 1. 拉取源码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 预装系统依赖（ESP-IDF/espup 必备底层组件）
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git cmake ninja-build libusb-1.0-0 python3 python3-pip

      # 3. 安装宿主端基础 Rust（仅做运行时基础，不指定ESP目标）
      - name: Setup stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # 4. 缓存ESP工具链（大幅提速，避免重复下载超时失败）
      - name: Cache ESP espup toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.espressif
            ~/.cargo/bin
            ~/export-esp.sh
          key: esp-espup-${{ runner.os }}

      # 5. 安装espup + Xtensa专属Rust工具链（唯一支持ESP32-S3目标的步骤）
      - name: Install espup & ESP-IDF toolchain
        run: |
          cargo install espup
          # 显式指定目标安装，提前拉取ESP32-S3对应的工具链，降低编译期风险
          espup install --targets esp32s3 -s ${{ env.ESP_EXPORT }}

      # 6. 预校验：确认目标工具链可用（编译前排错，避免中途失败）
      - name: Verify ESP32-S3 target available
        run: |
          source ${{ env.ESP_EXPORT }}
          rustup target list --installed | grep ${{ env.ESP_TARGET }}
          cargo --version

      # 7. 显式指定目标编译固件（双重兜底，不依赖项目内config.toml）
      - name: Build release firmware
        working-directory: ./firmware/handheld
        run: |
          source ${{ env.ESP_EXPORT }}
          cargo build --release --target ${{ env.ESP_TARGET }}

      # 8. 上传编译好的固件
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: handheld-firmware-bin
          path: firmware/handheld/target/${{ env.ESP_TARGET }}/release/handheld.bin
